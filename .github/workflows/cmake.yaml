name: CMake Multi-Platform Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    tags:
      - "**/**"

jobs:
  build:
    name: ${{ matrix.os }} | ${{ matrix.toolchain }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # =====================
          # Linux
          # =====================
          - os: linux
            runner: ubuntu-latest
            triplet: x64-linux
            toolchain: gcc
            cc: gcc
            cxx: g++

          - os: linux
            runner: ubuntu-latest
            triplet: x64-linux
            toolchain: clang
            cc: clang
            cxx: clang++

          # =====================
          # Windows
          # =====================
          - os: windows
            runner: windows-latest
            triplet: x64-windows
            toolchain: msvc
            cc: cl
            cxx: cl

          - os: windows
            runner: windows-latest
            triplet: x64-windows
            toolchain: clang
            cc: clang
            cxx: clang++

          # =====================
          # Darwin
          # =====================
          - os: darwin
            runner: macos-latest
            triplet: arm64-osx
            toolchain: gcc
            cc: gcc
            cxx: g++

          - os: darwin
            runner: macos-latest
            triplet: arm64-osx
            toolchain: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Sanitize Version Name
        id: version-name
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          ref="${{ github.ref_name }}"

          tag="${ref##*/}"

          if [[ "$tag" == v* ]]; then
            tag="${tag#v}"
          fi

          version=$(echo "$tag" | sed 's/[^a-zA-Z0-9._-]/-/g')

          if [[ "$version" =~ ^[0-9]+(\.[0-9]+)+([._-][A-Za-z0-9]+)?$ ]]; then
            echo "version=$version" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            vcpkg/installed
          key: vcpkg-${{ matrix.os }}-${{ matrix.toolchain }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-${{ matrix.toolchain }}-
            vcpkg-${{ matrix.os }}-

      - name: Bootstrap VCPkg
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Bootstrap VCPkg (Windows)
        if: runner.os == 'Windows'
        run: |
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        if: runner.os != 'Windows'
        run: |
          ./vcpkg/vcpkg install openssl libarchive zlib liblzma --triplet ${{ matrix.triplet }}-release

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          set VCPKG_BUILD_TYPE=release
          .\vcpkg\vcpkg install openssl libarchive zlib liblzma --triplet ${{ matrix.triplet }}-release

      - name: Configure CMake
        if: matrix.toolchain != 'msvc'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake
          -S .
          -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}-release
          -DUNVM_PROJECT_VERSION='${{ steps.version-name.outputs.version }}'

      - name: Find Visual Studio (MSVC)
        id: msvc
        if: matrix.toolchain == 'msvc'
        shell: pwsh
        run: |
          $VS_PATH = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          echo "path=$VS_PATH" >> $env:GITHUB_OUTPUT
          echo "vars=$VS_PATH\VC\Auxiliary\Build\vcvars64.bat" >> $env:GITHUB_OUTPUT

      - name: Configure CMake (MSVC)
        if: matrix.toolchain == 'msvc'
        shell: cmd
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          call "${{ steps.msvc.outputs.vars }}"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}-release -DUNVM_PROJECT_VERSION='${{ steps.version-name.outputs.version }}'

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release --prefix build/install

      - name: Test (help)
        run: |
          ./build/install/bin/unvm

      - name: Test (list)
        run: |
          ./build/install/bin/unvm list
          ./build/install/bin/unvm list --available
          ./build/install/bin/unvm l
          ./build/install/bin/unvm l --available

      - name: Test (integration, global)
        run: |
          ./build/install/bin/unvm install latest
          ./build/install/bin/unvm use latest
          ./build/install/bin/node --version
          ./build/install/bin/unvm use none
          ./build/install/bin/unvm remove latest

      - name: Test (integration, local)
        run: |
          ./build/install/bin/unvm install latest
          ./build/install/bin/unvm use latest --local
          ./build/install/bin/node --version
          ./build/install/bin/unvm use none --local
          ./build/install/bin/unvm remove latest

      - name: Test (integration, package)
        shell: bash
        run: |
          mkdir test
          cd test
          echo '{"name":"test","version":"1.0.0","engines":{"node":">=18 <21"}}' > package.json
          ../build/install/bin/node --version
          rm package.json
          cd ..
          rmdir test

      - name: Package
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          mkdir dist
          cd dist
          cpack --config ../build/CPackConfig.cmake -D CPACK_PACKAGE_FILE_NAME=dist

      - name: Upload Packages
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in dist/*; do
            [ -f "$file" ] || continue

            ext="$(basename "$file")"
            ext="${ext#*.}"

            target="dist/unvm-${{ steps.version-name.outputs.version }}-${{ matrix.os }}-${{ matrix.toolchain }}.${ext}"

            mv "$file" "$target"

            echo "Upload $target to ${{ github.ref_name }}"
            gh release upload ${{ github.ref_name }} "$target" --clobber
          done
